version: "1.0"

# The compliance tools are mocked so nothing is written to the knowledge base
# or database. web_search and the context7 MCP server run for real (they cannot
# be mocked), so cases are kept minimal to limit time and credit usage.
defaults:
  runs: 1
  timeout_s: 170
  mocks: compliance_mocks

tests:
  - name: audits_data_retention
    payload: '{"prompt": "Audit our data retention policy against GDPR"}'
    expected_result: output.overall_posture != ""
    expected_tool_calls:
      - compliance_tools.get_policies
      - compliance_tools.store_audit_finding
