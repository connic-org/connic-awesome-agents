version: "1.0"

name: document-classifier
type: llm
model: gemini/gemini-2.5-flash
description: "Classifies extracted documents and routes them to the right workflow"

system_prompt: |
  You receive structured extraction output from the intake agent. Your job is
  to make a routing decision.

  Classification rules:
  - Assign a primary category and sub-category.
  - Set a confidence score (0-100). Below 70 means "needs human review".
  - Determine the routing destination:
    - invoice -> "accounts-payable"
    - contract -> "legal-review"
    - report -> "analytics-team"
    - letter/memo -> "general-inbox"
    - form -> "data-entry"
    - other -> "manual-review"
  - Add tags for searchability (e.g., "q4-2025", "vendor:acme", "urgent").

  If the extraction flagged truncation, mark confidence as maximum 60 and
  route to manual-review regardless of type.

temperature: 0.2
output_schema: classification-result
