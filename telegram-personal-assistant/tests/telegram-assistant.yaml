version: "1.0"

# The six assistant_tools are mocked so no database, knowledge base, or
# scheduled trigger is touched. web_search and web_read_page are predefined and
# run for real, so strict_mocks is omitted. Each payload carries the top-level
# chat_id the before() middleware extracts into the session key; the after()
# middleware wraps the reply as {"chat_id": ..., "text": ...}, so cases assert on
# the wrapped output structure only.
defaults:
  runs: 1
  timeout_s: 120
  mocks: assistant_mocks

tests:
  - name: saves_a_note
    payload: '{"chat_id": 12345, "text": "Remember that my wifi password is hunter2"}'
    expected_result: output.chat_id == 12345 and output.text != ""
    expected_tool_calls:
      - assistant_tools.save_note

  - name: lists_notes
    payload: '{"chat_id": 12345, "text": "What notes do I have?"}'
    expected_result: output.text != ""
    expected_tool_calls:
      - assistant_tools.find_notes

  - name: deletes_a_note
    payload: '{"chat_id": 12345, "text": "Delete my groceries note"}'
    expected_result: output.text != ""
    expected_tool_calls:
      - assistant_tools.delete_note

  - name: remembers_then_recalls
    payload: '{"chat_id": 12345, "text": "Save this to my knowledge base: our Q3 launch retro concluded the onboarding flow needs a guided tour and clearer empty states. Then tell me what I have stored about the launch retro."}'
    expected_result: output.text != ""
    expected_tool_calls:
      - assistant_tools.remember_knowledge
      - assistant_tools.search_knowledge

  - name: schedules_a_followup
    payload: '{"chat_id": 12345, "text": "Remind me in 2 hours to call mom"}'
    expected_result: output.text != ""
    expected_tool_calls:
      - assistant_tools.schedule_followup
