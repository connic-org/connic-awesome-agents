version: "1.0"

# The analyst's entire tool list is the one custom file tool, so strict_mocks
# holds: every tool call is one we stubbed and nothing touches the knowledge
# base. Output is raw text, so the case asserts the run completed.
defaults:
  runs: 1
  timeout_s: 60
  mocks: research_mocks
  strict_mocks: true

tests:
  - name: searches_internal_knowledge
    payload: '{"question":"What is our current data retention period?"}'
    expected_result: status == "completed"
    expected_tool_calls:
      - research_tools.search_internal_knowledge
